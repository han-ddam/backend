<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" font-family="sans-serif">
  <rect width="860" height="240" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <path d="M0,6 a6,6 0 0 1 6,-6 h848 a6,6 0 0 1 6,6 v26 h-860 z" fill="#10b981"/>
  <text x="16" y="22" fill="#fff" font-size="14" font-weight="700">방문 인증하기 (작성·제출) — DTO</text>
  <g font-family="monospace" font-size="12" fill="#0f172a">
    <text x="16" y="54"><tspan fill="#047857">GET</tspan>  /scoring/places/:id   (예상 점수 +15, 지역 가중치 ×1.5)</text>
    <text x="16" y="74">     →  { action, basePoints, regionWeight, rarityWeight, eventMultiplier, estimatedPoints }</text>
    <text x="16" y="102"><tspan fill="#1d4ed8">POST</tspan> /certifications/photos/presigned   (S3 업로드 URL 발급)</text>
    <text x="16" y="122">     req { contentType }  →  { uploadUrl, imageKey }</text>
    <text x="16" y="150"><tspan fill="#1d4ed8">POST</tspan> /certifications   (header: <tspan fill="#b45309">Idempotency-Key</tspan> · "인증 올리기")</text>
    <text x="16" y="170">     req { placeId, imageKey, deviceLat, deviceLng, capturedAt, caption?, visibility:PRIVATE|PUBLIC }</text>
  </g>
  <g font-family="sans-serif" font-size="11.5" fill="#475569">
    <text x="16" y="196"><tspan fill="#b45309" font-weight="700">Idempotency-Key</tspan> = "인증 올리기" 탭 시 클라가 만든 UUID(재시도해도 동일). 점수·EXP·도감을 바꾸는 요청이라</text>
    <text x="16" y="213">더블탭·자동 재시도·응답 유실로 같은 인증이 여러 번 처리되면 +15점 중복 지급/도감 중복 등록됨 → 서버가 이 키로</text>
    <text x="16" y="230">"같은 시도"를 식별해 처음 1번만 처리, 이후엔 저장된 결과 반환(멱등). 위치·구도 체크는 클라 프리뷰, 최종 판정은 완료 화면 응답.</text>
  </g>
</svg>
