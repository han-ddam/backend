<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 170" font-family="sans-serif">
  <rect width="860" height="170" rx="6" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <path d="M0,6 a6,6 0 0 1 6,-6 h848 a6,6 0 0 1 6,6 v26 h-860 z" fill="#10b981"/>
  <text x="16" y="22" fill="#fff" font-size="14" font-weight="700">인증 진입 / 위치 선택 (주변 관광지) — DTO</text>
  <g font-family="monospace" font-size="12" fill="#0f172a">
    <text x="16" y="54"><tspan fill="#047857">GET</tspan> /places/nearby?lat=&amp;lng=&amp;radius=2000&amp;limit=20   (GPS → 가까운 순)</text>
    <text x="16" y="74">    →  [ { placeId, name, address, distanceM, regionCode, thumbnailUrl } ]</text>
    <text x="16" y="94">       예: 영금정 100m · 설악산 1200m …</text>
  </g>
  <g font-family="sans-serif" font-size="11.5" fill="#475569">
    <text x="16" y="120">바로 인증 탭 진입(장소 정보 없음) 또는 "위치 수정" 시. 사용자가 택1 → place_id → 카메라/작성(§5·§6).</text>
    <text x="16" y="138">근접계산 = PostGIS ST_DWithin (place 좌표 기준, GeoService) · place 좌표 미적재 시 빈 목록.</text>
    <text x="16" y="158" fill="#b45309">⚠ 유저 GPS=개인위치정보 → 근접 판정에만 쓰고 원본 좌표 미저장 방향(위치정보법, 법무 확인).</text>
  </g>
</svg>
